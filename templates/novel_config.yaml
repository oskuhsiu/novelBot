# Novel Config - 專案核心設定檔
# 所有 Skills 運作時必須先行讀取此設定檔

meta:
  project_id: "PROJECT_001"
  project_name: "我的小說"
  language: "zh-TW"
  created_at: ""
  
engine_settings:
  # 速度指針：決定一個章節要推進多少進度
  # 1.0 = 一章完成一個細目
  # 0.5 = 兩章完成一個細目
  # 0.1 = 十章完成一個細目
  pacing_pointer: 0.5
  
  # 每章字數範圍
  words_per_chapter:
    min: 3000
    max: 5000
    target: 4000
  
  # 劇情篇幅權重：決定各類內容的文字佔比
  content_weights:
    combat: 0.3           # 戰鬥描寫
    dialogue: 0.25        # 對話
    internal_monologue: 0.15  # 內心獨白
    scenery_desc: 0.15    # 環境描寫
    world_building: 0.10  # 世界觀補充
    action: 0.05          # 動作描寫

style_profile:
  # 小說類型
  genre: ""

  # [NEW] 核心劇情套路 (若未指定，系統將自動從 trope_library 選擇)
  main_plot_trope: ""  # e.g. "PLT_001"
  
  # 敘事視角
  # 選項：第一人稱 / 第三人稱全知 / 第三人稱受限
  perspective: "第三人稱受限"
  
  # 文字語氣/溫度
  tone: ""
  
  # 參考作家風格（用於模仿筆風）
  reference_authors: []
  
  # 獲獎獎項（用於提升 AI 寫作品質的暗示）
  awards: []
  
  # 語言規則
  linguistic_rules: []
  
  # 風格指南（詳細的寫作指引）
  guide: []

  # 資源數字精度（寫作與審查共用）
  # strict   — 所有資源精確到個位，不論階級
  # relative — ≥ 主角同階精確，低一階模糊量級（十幾、二十多），低兩階以上可省略（預設）
  # relaxed  — 僅劇情關鍵資源精確，其餘一律模糊
  resource_precision: "relative"

# 情感監控設定
emotion_settings:
  # 是否啟用情感監控
  enabled: true
  # 高壓閾值（0-100）
  high_tension_threshold: 70
  # 低壓閾值（0-100）
  low_tension_threshold: 30
  # 連續高壓章節上限
  max_consecutive_high: 3
  # 連續低壓章節上限
  max_consecutive_low: 2
  # 緩衝模式：suggest=建議, force=強制調整
  buffer_mode: "suggest"

# 主題追蹤設定（新增）
# 讓每個場景都與核心主題產生回響，避免「為了發生而發生」
theme_settings:
  # 是否啟用主題追蹤
  enabled: true
  
  # 主要主題（故事的核心問題）
  primary_theme: ""
  # 範例："權力是否必然腐蝕人性"、"愛與自由能否共存"
  
  # 次要主題
  secondary_themes: []
  # 範例：["救贖的代價", "信任與背叛"]
  
  # 主題意象（反覆出現的象徵物）
  theme_motifs:
    - symbol: ""
      meaning: ""
      max_usage_per_arc: 3  # 避免過度使用
    # 範例：
    # - symbol: "火焰"
    #   meaning: "毀滅與重生"
    # - symbol: "鏡子"
    #   meaning: "自我認知與虛偽"
  
  # 主題發展弧線（在不同階段如何呈現主題）
  theme_arc:
    opening: ""      # 提出問題
    development: ""  # 質疑與探索
    crisis: ""       # 最黑暗時刻
    resolution: ""   # 答案或留白
  # 範例：
  # opening: "提出問題：權力是否必然腐蝕？"
  # development: "角色在權力與良知間掙扎"
  # crisis: "連純潔者也被迫做出灰色選擇"
  # resolution: "發現是恐懼而非權力本身在腐蝕"

# 動態風格設定（新增）
# 根據劇情階段自動調整寫作風格
style_dynamics:
  # 是否啟用動態調整
  enabled: false
  
  # 階段覆蓋：在特定條件下改變風格
  stage_overrides: []
  # 範例：
  # - trigger: "arc >= 5"
  #   changes:
  #     tone: "逐漸沉重"
  #     prose: "加入文青描寫"
  # - trigger: "emotion_log.consecutive_high >= 2"
  #   changes:
  #     tone: "插入喘息段落"

world_rules:
  # 世界觀的核心規則/物理法則
  - ""

